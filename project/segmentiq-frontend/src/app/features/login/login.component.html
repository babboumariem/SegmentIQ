          <div class="brand-text">
            <div class="brand-name">Segment<em>IQ</em></div>
            <div class="brand-tagline">The3Beez Intelligence Platform</div>
          </div>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Form section -->
        <div class="form-section">

          <h1 class="form-title">Welcome back</h1>
          <p class="form-subtitle">Sign in to your workspace to continue.</p>

          <!-- Email -->
          <div class="field" [class.has-error]="errors.email">
            <label class="field-label">Email address</label>
            <div class="input-wrap" [class.error]="errors.email">
              <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input type="email" placeholder="you&#64;the3beez.com" [(ngModel)]="email" (focus)="errors.email=''" autocomplete="email"/>
            </div>
            @if (errors.email) { <p class="field-err">{{ errors.email }}</p> }
          </div>

          <!-- Password -->
          <div class="field" [class.has-error]="errors.password">
            <label class="field-label">Password</label>
            <div class="input-wrap" [class.error]="errors.password">
              <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input [type]="showPwd ? 'text' : 'password'" placeholder="Enter your password" [(ngModel)]="password" (focus)="errors.password=''" (keydown.enter)="onSubmit()" autocomplete="current-password"/>
              <button class="eye-btn" type="button" (click)="showPwd=!showPwd">
                @if (showPwd) {
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                } @else {
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                }
              </button>
            </div>
            @if (errors.password) { <p class="field-err">{{ errors.password }}</p> }
          </div>

          <!-- Options row -->
          <div class="options-row">
            <label class="remember" (click)="remember=!remember">
              <span class="checkbox" [class.checked]="remember">
                @if (remember) {
                  <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                }
              </span>
              Keep me signed in
            </label>
            <button class="forgot" type="button">Forgot password?</button>
          </div>

          <!-- Global error -->
          @if (globalError) {
            <div class="error-msg">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              {{ globalError }}
            </div>
          }

          <!-- Submit -->
          <button class="submit-btn" [class.loading]="loading" (click)="onSubmit()" [disabled]="loading">
            @if (loading) {
              <span class="spinner"></span>
              Signing in…
            } @else {
              Sign in to workspace
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            }
          </button>

        </div>

        <!-- Quick access -->
        <div class="quick-access">
          <span class="quick-label">Quick demo access</span>
          <div class="role-row">

            <button class="role-pill admin-pill" (click)="fillDemo('admin')">
              <span class="pill-shine"></span>
              <svg class="pill-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              <span class="pill-title">ADMIN</span>
            </button>

            <button class="role-pill analyst-pill" (click)="fillDemo('analyst')">
              <span class="pill-shine"></span>
              <svg class="pill-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              <span class="pill-title">ANALYST</span>
            </button>

          </div>
        </div>

      </div>
    </div>
