<header class="topbar">

      <!-- LEFT — page identity -->
      <div class="tb-left">
        <div class="tb-crumb">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
          {{ nav.currentConfig().crumb }}
        </div>
        <div class="tb-title-row">
          <div class="tb-accent-bar"></div>
          <div class="tb-title">{{ nav.currentConfig().title }}</div>
        </div>
      </div>

      <!-- RIGHT — actions -->
      <div class="tb-right">


        <!-- Date chip -->
        <div class="date-chip">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          {{ dateStr }}
        </div>

        <div class="tb-sep"></div>

        <!-- The3Beez honey button -->
        <a class="honey-btn" href="https://the3beez.com" target="_blank" rel="noopener noreferrer">
          <div class="honey-btn-shimmer"></div>
          <span class="honey-jar">🍯</span>
          <span class="honey-btn-label">the3beez.com</span>
          <svg class="honey-arrow" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </a>

        <div class="tb-sep"></div>

        <!-- Notification bell -->
        <app-notification-bell />

        <div class="tb-sep"></div>

        <!-- Theme toggle -->
        <button class="theme-btn" (click)="theme.toggle()"
          [title]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
          <span class="theme-btn-icon">
            @if (theme.isDark()) {
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            } @else {
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            }
          </span>
          <span class="theme-btn-label">{{ theme.isDark() ? 'Light' : 'Dark' }}</span>
        </button>

      </div>
    </header>
